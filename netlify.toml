[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/assistant/answer"
  to = "/.netlify/functions/llm-assistant"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
